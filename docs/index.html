<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grafos Lab Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <main class="layout">
      <section class="panel controles">
        <h1>Grafos Lab Web</h1>
        <p class="subtitle">Manipular, criar e editar arquivos .dot</p>

        <div class="group">
          <label for="tipoGrafo">Tipo de grafo</label>
          <div class="row">
            <select id="tipoGrafo">
              <option value="directed">Orientado</option>
              <option value="undirected">Não orientado</option>
            </select>
            <input id="nomeGrafo" placeholder="nome do grafo" value="grafo_web" />
            <button id="botaoCriarGrafo" class="primary">Criar</button>
          </div>
        </div>

        <div class="group">
          <label>Arquivo DOT</label>
          <div class="row">
            <input id="arquivoDot" type="file" accept=".dot,.txt" />
            <button id="botaoCarregarDot">Carregar</button>
            <button id="botaoBaixarDot">Baixar DOT</button>
          </div>
        </div>

        <div class="group">
          <label>Vertices</label>
          <div class="row">
            <input id="nomeVertice" placeholder="nome do vertice" />
            <button id="botaoAdicionarVertice">Adicionar</button>
            <button id="botaoRemoverVertice">Remover</button>
          </div>
        </div>

        <div class="group">
          <label>Arestas</label>
          <div class="row">
            <input id="origemAresta" placeholder="origem" />
            <input id="destinoAresta" placeholder="destino" />
            <input id="pesoAresta" type="number" step="0.01" placeholder="peso" />
            <button id="botaoAdicionarAresta">Adicionar</button>
            <button id="botaoRemoverAresta">Remover</button>
          </div>
        </div>

        <div class="group">
          <label>Algoritmos</label>
          <div class="grid-buttons">
            <button id="botaoOrdem">Ordem</button>
            <button id="botaoGraus">Graus</button>
            <button id="botaoExibirDot">Exibir DOT</button>
            <button id="botaoMenorCaminho">Dijkstra</button>
            <button id="botaoBuscaLargura">BFS</button>
            <button id="botaoBuscaProfundidade">DFS</button>
            <button id="botaoPrim">MST Prim</button>
            <button id="botaoKruskal">MST Kruskal</button>
            <button id="botaoComponentesConexos">F-Conexos</button>
            <button id="botaoGrafoReduzido">Grafo Reduzido</button>
            <button id="botaoBaixarImagem">Baixar PNG</button>
            <button id="botaoLimparHistorico">Limpar histórico</button>
          </div>
        </div>
      </section>

      <section class="panel visualizacao">
        <div class="viz-header">
          <h2>Painel do grafo</h2>
          <span id="resumoGrafo">Nenhum grafo carregado</span>
        </div>
        <div id="painelGrafo" class="painel-grafo"></div>
        <h3>Histórico</h3>
        <pre id="historicoSaida" class="historico-saida"></pre>
      </section>
    </main>

    <script defer src="./app.js"></script>
  </body>
</html>
